name: Release iOS

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Check version
        run: |
          TAG=${{ github.ref_name }}
          PROPERTIES_PATH=gradle.properties
          APP_VERSION=$(awk -F'=' '/^app.versionName/ {print $2}' $PROPERTIES_PATH)
          if [ "$TAG" != "$APP_VERSION" ]; then
            echo "Tag $TAG does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Set Flavor
        run: echo "buildkonfig.flavor=release" >> gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Update iOS version
        run: ./gradlew updateProjectVersions

      - name: Install Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.PRIVATE_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.PRIVATE_API_KEY_ID }}.p8

      - name: Set Team ID
        run: |
          sed -i '' "s/\[MY_TEAM_ID\]/${{ secrets.APPLE_TEAM_ID }}/" iosApp/ExportOptions.plist
          sed -i '' "s/^TEAM_ID=$/TEAM_ID=${{ secrets.APPLE_TEAM_ID }}/" iosApp/Configuration/Config.xcconfig

      - name: Build and Export IPA
        run: |
          xcodebuild archive \
            -scheme "iosApp" \
            -project "iosApp.xcodeproj" \
            -configuration Release \
            -archivePath "build/ios.xcarchive" \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.PRIVATE_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.PRIVATE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.PRIVATE_API_KEY_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE="Automatic"

          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath "build/ios.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "build/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.PRIVATE_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.PRIVATE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.PRIVATE_API_KEY_ISSUER_ID }}"

          mv build/ipa/*.ipa build/recstar-${{ github.ref_name }}.ipa
        working-directory: iosApp

      - name: Upload app to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: iosApp/build/recstar-${{ github.ref_name }}.ipa
          issuer-id: ${{ secrets.PRIVATE_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.PRIVATE_API_KEY_ID }}
          api-private-key: ${{ secrets.PRIVATE_API_KEY }}
